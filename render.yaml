services:
  - type: web
    name: beerify-api
    env: python
    buildCommand: pip install poetry && poetry install --no-interaction --no-root
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://lfresco.github.io/beerify,http://localhost:5173
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.13.1
